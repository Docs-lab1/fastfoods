<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chikorlando - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #B71C1C, #D32F2F);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 48px;
            color: #D32F2F;
            background: #fff5f5;
            padding: 20px;
            border-radius: 50%;
        }
        .logo h1 {
            color: #B71C1C;
            font-size: 28px;
            margin-top: 12px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            background: #f5f5f5;
            padding: 6px;
            border-radius: 12px;
        }
        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: #666;
            font-size: 13px;
        }
        .role-btn.active {
            background: #D32F2F;
            color: white;
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
        }
        .role-btn i {
            margin-right: 6px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus {
            border-color: #D32F2F;
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #B71C1C, #D32F2F);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .login-btn:hover {
            transform: scale(1.02);
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .error-msg {
            color: #f44336;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .demo-creds {
            margin-top: 20px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
        }
        .demo-creds strong {
            color: #333;
        }
        .demo-creds .cred {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 12px;
        }
        .demo-creds .cred span:last-child {
            color: #333;
            font-weight: 500;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        .skip-login {
            text-align: center;
            margin-top: 12px;
        }
        .skip-login a {
            color: #999;
            text-decoration: none;
            font-size: 13px;
        }
        .skip-login a:hover {
            color: #D32F2F;
            text-decoration: underline;
        }
        .status-msg {
            text-align: center;
            font-size: 13px;
            margin-top: 8px;
            padding: 8px;
            border-radius: 8px;
            display: none;
        }
        .status-msg.show {
            display: block;
        }
        .status-msg.loading {
            background: #e3f2fd;
            color: #1976d2;
        }
        .status-msg.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-msg.error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-utensils"></i>
            <h1>Chikorlando</h1>
            <p>Restaurant & Take Away</p>
            <small style="color: #999;">Kasama District</small>
        </div>

        <div class="role-selector">
            <button class="role-btn active" data-role="customer" onclick="selectRole('customer')">
                <i class="fas fa-user"></i> Customer
            </button>
            <button class="role-btn" data-role="admin" onclick="selectRole('admin')">
                <i class="fas fa-user-shield"></i> Admin
            </button>
            <button class="role-btn" data-role="delivery" onclick="selectRole('delivery')">
                <i class="fas fa-truck"></i> Delivery
            </button>
        </div>

        <div id="statusMsg" class="status-msg"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="skip-login">
            <a href="index.html">Continue as Guest →</a>
        </div>

        <div class="demo-creds">
            <strong>🔑 Demo Credentials:</strong>
            <div class="cred">
                <span>👤 Customer:</span>
                <span>customer@chikorlando.com / customer123</span>
            </div>
            <div class="cred">
                <span>👨‍💼 Admin:</span>
                <span>admin@chikorlando.com / admin123</span>
            </div>
            <div class="cred">
                <span>🚚 Delivery:</span>
                <span>delivery@chikorlando.com / delivery123</span>
            </div>
        </div>
    </div>

    <!-- Load scripts in correct order -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        // ============================================
        // LOGIN SCRIPT - Runs after config.js loads
        // ============================================
        
        let selectedRole = 'customer';

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.role === role);
            });
            document.getElementById('errorMsg').classList.remove('show');
            
            // Auto-fill demo credentials
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            
            if (role === 'customer') {
                emailInput.value = 'customer@chikorlando.com';
                passwordInput.value = 'customer123';
            } else if (role === 'admin') {
                emailInput.value = 'admin@chikorlando.com';
                passwordInput.value = 'admin123';
            } else if (role === 'delivery') {
                emailInput.value = 'delivery@chikorlando.com';
                passwordInput.value = 'delivery123';
            }
        }

        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('statusMsg');
            statusEl.textContent = message;
            statusEl.className = 'status-msg show ' + type;
        }

        function hideStatus() {
            document.getElementById('statusMsg').className = 'status-msg';
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                errorMsg.textContent = 'Please enter both email and password';
                errorMsg.classList.add('show');
                return;
            }

            // Show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            errorMsg.classList.remove('show');
            showStatus('Connecting to server...', 'loading');

            try {
                // Check if Supabase is available
                if (typeof window.supabaseClient === 'undefined') {
                    throw new Error('Supabase not initialized. Please check config.js');
                }

                const supabase = window.supabaseClient;
                
                // Test connection first
                showStatus('Testing connection...', 'loading');
                const { data: testData, error: testError } = await supabase
                    .from('users')
                    .select('count', { count: 'exact', head: true });
                
                if (testError) {
                    console.error('Connection test error:', testError);
                    throw new Error('Cannot connect to database. Please check your connection.');
                }

                showStatus('Authenticating user...', 'loading');

                // Try to sign in
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    if (error.message.includes('Invalid login credentials')) {
                        throw new Error('Invalid email or password. Please try again.');
                    }
                    throw error;
                }

                if (data.user) {
                    showStatus('User authenticated, checking role...', 'loading');
                    
                    // Check user role from database
                    const { data: userData, error: roleError } = await supabase
                        .from('users')
                        .select('role, name')
                        .eq('id', data.user.id)
                        .single();

                    let userRole = 'customer';
                    let userName = email.split('@')[0];

                    if (roleError) {
                        // User not in users table - create as customer
                        showStatus('Creating user profile...', 'loading');
                        const { error: insertError } = await supabase
                            .from('users')
                            .insert([{
                                id: data.user.id,
                                email: email,
                                role: 'customer',
                                name: email.split('@')[0]
                            }]);

                        if (insertError) {
                            console.error('Error creating user:', insertError);
                        }
                    } else {
                        userRole = userData.role || 'customer';
                        userName = userData.name || email.split('@')[0];
                    }

                    // Save user info
                    localStorage.setItem('userRole', userRole);
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userName', userName);

                    showStatus('Login successful! Redirecting...', 'success');

                    // Redirect based on role
                    setTimeout(() => {
                        if (userRole === 'admin') {
                            window.location.href = 'admin.html';
                        } else if (userRole === 'delivery') {
                            window.location.href = 'delivery.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1000);
                }

            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = error.message || 'Login failed. Please try again.';
                errorMsg.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                showStatus(error.message, 'error');
            }
        }

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                if (typeof window.supabaseClient === 'undefined') {
                    console.error('Supabase not loaded. Check config.js');
                    document.getElementById('errorMsg').textContent = 'Configuration error. Please contact support.';
                    document.getElementById('errorMsg').classList.add('show');
                    return;
                }

                const supabase = window.supabaseClient;
                const { data: { user } } = await supabase.auth.getUser();
                
                if (user) {
                    const { data: userData } = await supabase
                        .from('users')
                        .select('role')
                        .eq('id', user.id)
                        .single();
                    
                    if (userData) {
                        localStorage.setItem('userRole', userData.role);
                        localStorage.setItem('userEmail', user.email);
                        if (userData.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else if (userData.role === 'delivery') {
                            window.location.href = 'delivery.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }
                }
            } catch (e) {
                console.error('Auto-login check error:', e);
            }
            
            // Auto-fill default credentials
            document.getElementById('email').value = 'customer@chikorlando.com';
            document.getElementById('password').value = 'customer123';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chikorlando - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #B71C1C, #D32F2F);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 48px;
            color: #D32F2F;
            background: #fff5f5;
            padding: 20px;
            border-radius: 50%;
        }
        .logo h1 {
            color: #B71C1C;
            font-size: 28px;
            margin-top: 12px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            background: #f5f5f5;
            padding: 6px;
            border-radius: 12px;
        }
        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: #666;
            font-size: 13px;
        }
        .role-btn.active {
            background: #D32F2F;
            color: white;
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
        }
        .role-btn i {
            margin-right: 6px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus {
            border-color: #D32F2F;
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #B71C1C, #D32F2F);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .login-btn:hover {
            transform: scale(1.02);
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .error-msg {
            color: #f44336;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .demo-creds {
            margin-top: 20px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
        }
        .demo-creds strong {
            color: #333;
        }
        .demo-creds .cred {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-utensils"></i>
            <h1>Chikorlando</h1>
            <p>Restaurant & Take Away</p>
            <small style="color: #999;">Kasama District</small>
        </div>

        <div class="role-selector">
            <button class="role-btn active" data-role="customer" onclick="selectRole('customer')">
                <i class="fas fa-user"></i> Customer
            </button>
            <button class="role-btn" data-role="admin" onclick="selectRole('admin')">
                <i class="fas fa-user-shield"></i> Admin
            </button>
            <button class="role-btn" data-role="delivery" onclick="selectRole('delivery')">
                <i class="fas fa-truck"></i> Delivery
            </button>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="demo-creds">
            <strong>Demo Credentials:</strong>
            <div class="cred">
                <span>👤 Customer:</span>
                <span>customer@chikorlando.com / customer123</span>
            </div>
            <div class="cred">
                <span>👨‍💼 Admin:</span>
                <span>admin@chikorlando.com / admin123</span>
            </div>
            <div class="cred">
                <span>🚚 Delivery:</span>
                <span>delivery@chikorlando.com / delivery123</span>
            </div>
        </div>
    </div>

    <script>
        let selectedRole = 'customer';

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.role === role);
            });
            document.getElementById('errorMsg').classList.remove('show');
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                errorMsg.textContent = 'Please enter both email and password';
                errorMsg.classList.add('show');
                return;
            }

            // Show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            errorMsg.classList.remove('show');

            try {
                const supabase = window.supabaseClient;
                if (!supabase) {
                    throw new Error('Supabase not initialized');
                }

                // Try to sign in
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                if (data.user) {
                    // Check user role from database
                    const { data: userData, error: roleError } = await supabase
                        .from('users')
                        .select('role')
                        .eq('id', data.user.id)
                        .single();

                    if (roleError) {
                        // If no role found, check if user exists in users table
                        const { data: allUsers } = await supabase
                            .from('users')
                            .select('role')
                            .eq('email', email)
                            .single();
                        
                        if (allUsers) {
                            // User exists with role
                            const userRole = allUsers.role;
                            
                            // Save user info
                            localStorage.setItem('userRole', userRole);
                            localStorage.setItem('userEmail', email);
                            localStorage.setItem('userName', data.user.user_metadata?.name || email.split('@')[0]);

                            // Redirect based on role
                            redirectUser(userRole);
                            return;
                        } else {
                            // New user - create customer account
                            const { error: insertError } = await supabase
                                .from('users')
                                .insert([{
                                    id: data.user.id,
                                    email: email,
                                    role: 'customer',
                                    name: email.split('@')[0]
                                }]);

                            if (insertError) throw insertError;

                            localStorage.setItem('userRole', 'customer');
                            localStorage.setItem('userEmail', email);
                            localStorage.setItem('userName', email.split('@')[0]);

                            window.location.href = 'index.html';
                            return;
                        }
                    }

                    // User has role
                    const userRole = userData.role;
                    localStorage.setItem('userRole', userRole);
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userName', data.user.user_metadata?.name || email.split('@')[0]);

                    redirectUser(userRole);
                }

            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = error.message || 'Login failed. Please try again.';
                errorMsg.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        }

        function redirectUser(role) {
            switch(role) {
                case 'admin':
                    window.location.href = 'admin.html';
                    break;
                case 'delivery':
                    window.location.href = 'delivery.html';
                    break;
                case 'customer':
                default:
                    window.location.href = 'index.html';
                    break;
            }
        }

        // Auto-login if already logged in
        document.addEventListener('DOMContentLoaded', async function() {
            const supabase = window.supabaseClient;
            if (supabase) {
                const { data: { user } } = await supabase.auth.getUser();
                if (user) {
                    // Check role and redirect
                    const { data: userData } = await supabase
                        .from('users')
                        .select('role')
                        .eq('id', user.id)
                        .single();
                    
                    if (userData) {
                        localStorage.setItem('userRole', userData.role);
                        localStorage.setItem('userEmail', user.email);
                        redirectUser(userData.role);
                    }
                }
            }
        });
    </script>
</body>
</html>

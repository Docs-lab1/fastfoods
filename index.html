<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chikorlando Restaurant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <div class="logo-container">
                    <i class="fas fa-utensils"></i>
                    <h1>Chikorlando</h1>
                </div>
                <div class="header-actions">
                    <button class="cart-btn" onclick="toggleCart()">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </button>
                </div>
            </div>
            <div class="header-bottom">
                <p>Restaurant & Take away</p>
                <small>Kasama District</small>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Welcome Section -->
            <section class="welcome-section">
                <div class="welcome-text">
                    <h2>Welcome to Chikorlando</h2>
                    <p>Delicious meals delivered to your doorstep</p>
                </div>
                <button class="order-now-btn" onclick="showMenu()">
                    <i class="fas fa-utensil-spoon"></i> Order Now
                </button>
            </section>

            <!-- Category Filter -->
            <section class="category-filter">
                <button class="category-btn active" data-category="all">All</button>
                <button class="category-btn" data-category="main">Main Dishes</button>
                <button class="category-btn" data-category="appetizer">Appetizers</button>
                <button class="category-btn" data-category="drinks">Drinks</button>
                <button class="category-btn" data-category="dessert">Desserts</button>
            </section>

            <!-- Menu Items -->
            <section class="menu-section" id="menuSection">
                <div class="menu-grid" id="menuGrid">
                    <!-- Menu items will be loaded here -->
                </div>
            </section>

            <!-- Cart Sidebar -->
            <div class="cart-sidebar" id="cartSidebar">
                <div class="cart-header">
                    <h3><i class="fas fa-shopping-cart"></i> Your Order</h3>
                    <button class="close-cart" onclick="toggleCart()">×</button>
                </div>
                <div class="cart-items" id="cartItems">
                    <!-- Cart items will be listed here -->
                </div>
                <div class="cart-footer">
                    <div class="cart-total">
                        <span>Total:</span>
                        <span class="total-amount" id="cartTotal">K0.00</span>
                    </div>
                    <button class="checkout-btn" onclick="proceedToCheckout()">
                        <i class="fas fa-credit-card"></i> Checkout
                    </button>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="navigateTo('home')">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="navigateTo('menu')">
                <i class="fas fa-utensils"></i>
                <span>Menu</span>
            </button>
            <button class="nav-item" onclick="navigateTo('orders')">
                <i class="fas fa-list"></i>
                <span>Orders</span>
            </button>
            <button class="nav-item" onclick="navigateTo('profile')">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </button>
        </nav>
    </div>

    <!-- Checkout Modal -->
    <div class="modal" id="checkoutModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Place Your Order</h3>
                <button class="modal-close" onclick="closeModal('checkoutModal')">×</button>
            </div>
            <form id="checkoutForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="customerName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="customerPhone" placeholder="0977 123 456" required>
                </div>
                <div class="form-group">
                    <label>Delivery Address *</label>
                    <textarea id="deliveryAddress" placeholder="Enter your delivery address" required></textarea>
                </div>
                <div class="form-group">
                    <label>Location on Map</label>
                    <div id="mapContainer" style="height: 200px; background: #e0e0e0; border-radius: 10px;"></div>
                    <button type="button" class="get-location-btn" onclick="getCurrentLocation()" style="margin-top: 10px;">
                        <i class="fas fa-location-dot"></i> Get Current Location
                    </button>
                </div>
                <button type="submit" class="place-order-btn">
                    <i class="fas fa-check"></i> Place Order
                </button>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js" type="module"></script>
    <script src="script.js" type="module"></script>
</body>
</html>

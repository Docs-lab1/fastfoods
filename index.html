<!DOCTYPE html>
<html>
<head>
    <title>Test Supabase Connection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Testing Supabase Connection</h2>
    <button onclick="testConnection()">Test Connection</button>
    <div id="result"></div>

    <script>
        // YOUR CORRECT CONFIGURATION
        const SUPABASE_URL = 'https://prsgpaqbokothjsqclyv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByc2dwYXFib2tvdGhqc3FjbHl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjQ2NzIsImV4cCI6MjA5ODI0MDY3Mn0.9aQAYye-50gwbK0V84RS8p_nS75bfr9fkG27c6QPODY';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing connection...';
            
            try {
                // Try to fetch menu items
                const { data, error } = await supabase
                    .from('menu_items')
                    .select('*')
                    .limit(5);
                
                if (error) {
                    if (error.code === '42P01') {
                        resultDiv.innerHTML = `
                            ❌ Table 'menu_items' doesn't exist yet.<br>
                            Please run the SQL schema creation script first.
                        `;
                    } else {
                        throw error;
                    }
                    return;
                }
                
                resultDiv.innerHTML = `
                    ✅ Connection successful!<br>
                    Found ${data.length} menu items:<br>
                    ${data.map(item => `- ${item.name}: K${item.price}`).join('<br>')}
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `❌ Error: ${error.message}`;
                console.error('Connection error:', error);
            }
        }
    </script>
</body>
</html>
